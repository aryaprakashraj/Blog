spring.application.name=Blog
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/personalblog}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
jwt.secret=${JWT_SECRET:your-super-secret-key-that-is-long-enough-for-hs256-algorithm}
jwt.expiration=${JWT_EXPIRATION:8640000}
admin.username=${ADMIN_USERNAME:user}
admin.password=${ADMIN_PASSWORD:password}


spring.mail.host=${NEWSLETTER_HOST_MAIL:}
spring.mail.port=587
spring.mail.username=${NEWSLETTER_USERNAME:}
spring.mail.password=${NEWSLETTER_API_KEY:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

